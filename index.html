<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Button Showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <h1 class="text-center">Bootstrap Button Showcase</h1>
            <div class="col">
                <h2>Basic Button</h2>
                <a href="#" class="btn mb-4 btn-primary">Click MEEEEEEEEEE</a>
                <h2>Button Colors</h2>
                <a href="#" class="btn mb-4 btn-primary">Primary</a>
                <a href="#" class="btn mb-4 btn-secondary">Secondary</a>
                <a href="#" class="btn mb-4 btn-success">Success</a>
                <a href="#" class="btn mb-4 btn-danger">Danger</a>
                <a href="#" class="btn mb-4 btn-warning dark">Warning</a>
                <a href="#" class="btn mb-4 btn-info dark">Info</a>
                <a href="#" class="btn mb-4 btn-light dark">Light</a>
                <a href="#" class="btn mb-4 btn-dark">Dark</a>
                <h2>Button Outlines</h2>
                <a href="#" class="btn mb-4 btn-outline-warning">Warning</a>
                <a href="#" class="btn mb-4 btn-outline-info">Info</a>
                <a href="#" class="btn mb-4 btn-outline-danger">Danger</a>
                <a href="#" class="btn mb-4 btn-outline-success">Success</a>
                <a href="#" class="btn mb-4 btn-outline-primary">Primary</a>
                <a href="#" class="btn mb-4 btn-outline-secondary">Secondary</a>
                <a href="#" class="btn mb-4 btn-outline-dark">Dark</a>
                <a href="#" class="btn mb-4 btn-outline-light">Light</a>
                <h2>Button Sizes</h2>
                <a href="#" class="btn mb-4 btn-primary btn-outline-warning">Small</a>
                <a href="#" class="btn mb-4 btn-warning btn-outline-primary">Large</a>
                <a href="#" class="btn mb-4 btn-Info">Custom</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
